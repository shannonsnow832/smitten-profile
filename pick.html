<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Smitten Singles - Submit Picks</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f7;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:1.5rem 1rem}
.logo{text-align:center;margin-bottom:1rem}
.logo h1{font-size:22px;font-weight:700;color:#C6302C}
.banner{background:#C6302C;color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:600;margin-bottom:1rem;border-radius:8px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.btn{display:block;width:100%;padding:12px;background:#C6302C;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.btn:hover{background:#a8231f}
.btn:disabled{background:#ccc;cursor:not-allowed}
.row{padding:12px 0;border-bottom:1px solid #f2f2f2}.row:last-child{border-bottom:none}
.top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.av{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#eee;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#999}
.opts{display:flex;gap:5px;padding-left:56px}
.opt{flex:1;padding:6px 2px;border-radius:8px;border:1px solid #ddd;background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:#999;text-align:center}
.opt.sd{background:#C6302C;border-color:#C6302C;color:#fff}
.opt.sf{background:#185FA5;border-color:#185FA5;color:#fff}
.opt.sn{background:#777;border-color:#777;color:#fff}
.opt.sx{background:#eee;border-color:#ddd;color:#999}
.al{padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:10px}
.ok{background:#e8f5e9;color:#2e7d32}
.er{background:#fdecea;color:#b71c1c}
.sp{display:inline-block;width:16px;height:16px;border:2px solid rgba(198,48,44,.2);border-top-color:#C6302C;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#888}
.ld{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.empty{text-align:center;padding:2rem;color:#999;font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="logo"><h1>Smitten Singles</h1></div>
  <div class="banner" id="banner">Loading&hellip;</div>
  <div id="alert"></div>
  <div class="leg">
    <span><span class="ld" style="background:#C6302C"></span>Date</span>
    <span><span class="ld" style="background:#185FA5"></span>Friend</span>
    <span><span class="ld" style="background:#777"></span>Not again</span>
  </div>
  <div class="card" style="padding:.75rem 1.25rem">
    <div id="al"><div class="empty"><span class="sp"></span> Loading attendees&hellip;</div></div>
  </div>
  <button class="btn" id="sb" onclick="savePicks()">Save picks</button>
  <p style="font-size:12px;color:#bbb;text-align:center;margin-top:8px">Submitting on behalf of this participant.</p>
</div>

<script>
var S='https://qgctltxcgsnbrdtbhmay.supabase.co';
var AN='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnY3RsdHhjZ3NuYnJkdGJobWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjgwNTcsImV4cCI6MjA5MDYwNDA1N30.-TS1CofnGMGAj38OrZAvtphbHPXQWZWtysO83_960M4';
var EV='d2b033e6-a79f-44e1-8282-f030bea541c0';
var PASS='smitten2026';
var PX={};
var PARTICIPANT_EMAIL='';
var PARTICIPANT_ID='';

function hdrs(){return{'Content-Type':'application/json',apikey:AN,Authorization:'Bearer '+AN};}
async function rpc(fn,args){var r=await fetch(S+'/rest/v1/rpc/'+fn,{method:'POST',headers:hdrs(),body:JSON.stringify(args)});return r.json();}

async function init(){
  var params=new URLSearchParams(location.search);
  PARTICIPANT_EMAIL=params.get('email')||'';
  if(!PARTICIPANT_EMAIL){
    document.getElementById('banner').textContent='No participant email specified.';
    document.getElementById('al').innerHTML='<div class="empty">Invalid link.</div>';
    return;
  }

  // Look up participant profile
  var pr=await rpc('admin_lookup_profile',{p_email:PARTICIPANT_EMAIL,p_admin_secret:PASS});
  if(!pr||!pr.ok){
    document.getElementById('banner').textContent='Participant not found.';
    return;
  }
  PARTICIPANT_ID=pr.profile_id;
  document.getElementById('banner').textContent='Submitting picks for: '+pr.first_name+' '+( pr.last_name||'');

  // Load attendees (all checked-in except this participant)
  var ar=await rpc('admin_get_attendees_for',{p_event_id:EV,p_profile_id:PARTICIPANT_ID,p_admin_secret:PASS});
  if(!ar||!ar.length){
    document.getElementById('al').innerHTML='<div class="empty">No other checked-in attendees.</div>';
    return;
  }

  // Load existing picks
  var ep=await rpc('admin_get_picks_for',{p_event_id:EV,p_profile_id:PARTICIPANT_ID,p_admin_secret:PASS});
  if(ep&&ep.length){
    ep.forEach(function(p){
      var t=p.pick_type==='date'?'d':p.pick_type==='friend'?'f':p.pick_type==='not_again'?'n':'x';
      PX[p.picked_id]=t;
    });
  }

  document.getElementById('al').innerHTML=ar.map(function(a){
    var ph=a.image_url?'<img class="av" src="'+a.image_url+'" alt="">':'<div class="av">'+(a.first_name||'?')[0].toUpperCase()+'</div>';
    return '<div class="row"><div class="top">'+ph+'<div><div style="font-size:15px;font-weight:600">'+(a.first_name||'Guest')+'</div></div></div>'
      +'<div class="opts">'
      +'<button class="opt" data-i="'+a.id+'" data-t="d" onclick="pk(\''+a.id+'\',\'d\')">&#10084; Date</button>'
      +'<button class="opt" data-i="'+a.id+'" data-t="f" onclick="pk(\''+a.id+'\',\'f\')">&#128075; Friend</button>'
      +'<button class="opt" data-i="'+a.id+'" data-t="n" onclick="pk(\''+a.id+'\',\'n\')">&#128683; Not again</button>'
      +'<button class="opt" data-i="'+a.id+'" data-t="x" onclick="pk(\''+a.id+'\',\'x\')">None</button>'
      +'</div></div>';
  }).join('');
  rfr();
}

function pk(id,t){if(PX[id]===t){delete PX[id];}else{PX[id]=t;}rfr();}

function rfr(){
  document.querySelectorAll('.opt').forEach(function(b){
    var i=b.dataset.i,t=b.dataset.t;
    b.className='opt';
    if(PX[i]===t)b.classList.add('s'+t);
  });
}

async function savePicks(){
  var b=document.getElementById('sb');
  b.disabled=true;b.innerHTML='<span class="sp"></span>Saving&hellip;';
  var map={d:'date',f:'friend',n:'not_again',x:'none'};
  var picks=Object.entries(PX).filter(function(e){return e[1]!=='x';}).map(function(e){return{picked_id:e[0],pick_type:map[e[1]]};});
  var d=await rpc('admin_submit_picks',{p_event_id:EV,p_profile_id:PARTICIPANT_ID,p_picks:picks,p_admin_secret:PASS});
  b.disabled=false;b.textContent='Save picks';
  if(d&&d.ok){
    document.getElementById('alert').innerHTML='<div class="al ok">Picks saved! You can close this tab.</div>';
  } else {
    document.getElementById('alert').innerHTML='<div class="al er">Error saving picks. Try again.</div>';
  }
}

init();
</script>
</body>
</html>
